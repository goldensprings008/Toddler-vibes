<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUDIO</title>
    <style>
        body{
            background-image: url("../IMAGES/landscape.png");
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Times New Roman', serif;
            color: white-ish;
            margin: 0;
            padding: 20px;
        }
        #audio h2{
            color: #ffd700;
            text-transform: uppercase;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
            text-align: center;
            font-size: 2.5rem;
            letter-spacing: 1.5px;
            font-weight: 700;
            margin: 24px 0;
        }
        #audio{
            padding: 60px 20px;
            text-align: center;
        }
        .audio-gallery{
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1100px;
            margin: 0 auto;
        }
        .audio-item{
            background: rgba(0, 0, 0, 0.45);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            
        }
        .audio-item audio{
            width: 100%;
            border-radius: 12px;
        }
        .audio-item p{
            margin: 0 0 12px;
            color: #f4f4f4;
            font-weight: 600;
        }
        .audio-item:hover{
            background: rgba(0, 0, 0, 0.6);
            border-color: rgba(255, 215, 0, 0.5);
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
        }
        @media (max-width: 768px) {
    .audio-gallery {
      gap: 18px;
    }
  }

    </style>
</head>
<body>
    <section id="audio">
    <h2>My audio</h2>
    <div class="audio-gallery">
        <div class="audio-item">
            <p>ARSENAL ANTHEM</p>
            <audio src="../AUDIO/ARSENAL ANTHEM.mp3" controls></audio>
        </div>
        <div class="audio-item">
            <p>MANCHESTER UNITED ANTHEM</p>
            <audio src="../AUDIO/MANCHESTER UNITED ANTHEM.mp3" controls></audio>
        </div>
        <div class="audio-item">
            <p>FIFA WORLD CUP</p>
            <audio src="../AUDIO/FIFA WORLD CUP.mp3" controls></audio>
        </div>
        <div class="audio-item">
            <p>CHAMPIONS LEAGUE ANTHEM</p>
            <audio src="../AUDIO/Champions League.mp3" controls></audio>
        </div>
        <div class="audio-item">
            <p>TATTOO BY LOREEN</p>
            <audio src="../AUDIO/Loreen - Tattoo.mp3" controls></audio>
        </div>
        <div class="audio-item">
            <p>AM UNSTOPABLE</p>
            <audio src="../AUDIO/Sia - Unstoppable.mp3" controls></audio>
        </div>
    </div>
</section>

</body>
</html>
