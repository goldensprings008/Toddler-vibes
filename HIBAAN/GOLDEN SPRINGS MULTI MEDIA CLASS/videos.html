<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIDEOS</title>
    <style>
        body {
            background-image: url("../IMAGES/landscape.png");
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            font-family: 'Times New Roman', serif;
            color: #333;
            line-height: 1.6;
        }
        h1{
            text-align: center;
            margin: 20px 0;
            font-size: 3.5rem;
            color:  #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .video-gallery{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        video{
            width: 100%;
            max-width: 500px;
            height: auto;
            border: 2px solid #fff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }
        video:hover{
            transform: scale(1.05);
         
        }
        @media (max-width: 768px) {
            .video-gallery {
                flex-direction: column;
                align-items: center;
            }
            video {
                max-width: 90%;
            }
            h1{
                font-size: 2em;
            }
        }




    </style>
</head>

<body>
    <section id="videos">
    <h1>My Videos </h1>
    <div class="video-gallery">
        <video src="../VIDEOS/Jey Uso Entrance.mp4" controls height="500px" width="500px"></video>
        <video src="../VIDEOS/CUNHA WINS IT!.mp4" controls height="500px" width="500px"></video>
        <video src="../VIDEOS/papaoute.mp4" controls height="500px" width="500px"></video>
        <video src="../VIDEOS/Goal Of The Season 2025.mp4" controls height="500px" width="500px"></video>
        <video src="../VIDEOS/KOBBIE MAINOOOO.mp4" controls height="500px" width="500px"></video>
        <video src="../VIDEOS/EFOOTBALL.mp4" controls height="500px" width="500px"></video>

    </div>

</section>
</body>
</html>
